<!DOCTYPE html>
<html>
<head>
  <title>Detailed Game Analysis - 10 Hard vs Hard Games</title>
  <script src="../game/js/chess-engine.js"></script>
  <script src="../game/js/mana-system.js"></script>
  <script src="../game/js/bot.js"></script>
  <style>
    body {
      font-family: 'Courier New', monospace;
      white-space: pre-wrap;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
      margin: 0;
      line-height: 1.3;
    }
    .game-section { border-top: 3px solid #2a9d8f; margin-top: 30px; padding-top: 15px; }
    .move { margin-left: 20px; font-size: 0.95em; }
    .position-analysis { background: #1a1a1a; padding: 10px; margin: 10px 0; border-left: 3px solid #e76f51; }
    .tactic { background: #1a1a1a; padding: 10px; margin: 10px 0; border-left: 3px solid #f4a261; }
    .combo { background: #1a1a1a; padding: 10px; margin: 10px 0; border-left: 3px solid #2a9d8f; color: #76c893; font-weight: bold; }
    .blunder { background: #2a1a1a; padding: 10px; margin: 10px 0; border-left: 3px solid #e76f51; color: #e76f51; font-weight: bold; }
    .good-move { background: #1a2a1a; padding: 10px; margin: 10px 0; border-left: 3px solid #76c893; color: #76c893; }
    .header { color: #2a9d8f; font-weight: bold; font-size: 1.1em; }
    .subheader { color: #f4a261; font-weight: bold; }
    .metric { color: #e9c46a; }
    .summary { background: #1a1a1a; padding: 15px; margin: 20px 0; border: 2px solid #2a9d8f; }
    table { border-collapse: collapse; margin: 10px 0; width: 100%; }
    td, th { padding: 8px; border: 1px solid #444; text-align: left; }
    th { background: #1a1a1a; color: #2a9d8f; }
  </style>
</head>
<body>
<div id="output"></div>

<script>
const output = document.getElementById('output');

function log(msg, style = '') {
  if (style) {
    output.innerHTML += `<div class="${style}">${msg}</div>`;
  } else {
    output.innerHTML += msg + '<br>';
  }
  console.log(msg);
}

function hr(char = '═') {
  log(char.repeat(100), 'header');
}

// Analysis data
const analysis = {
  games: [],
  stats: {
    totalGames: 0,
    totalMoves: 0,
    whiteWins: 0,
    blackWins: 0,
    draws: 0,
    comboExecutions: 0,
    shieldDoubleAttackCount: 0,
    hangingPiecesDetected: 0,
    goodTacticalMoves: 0,
    blunderCount: 0,
    aetherWasteInstances: 0
  }
};

function analyzeMoveQuality(state, move, fromPiece, forColor) {
  // Analyze if this is a good move
  let quality = { type: 'normal', comment: '' };

  const opp = opposite(forColor);
  const target = state.board[move.to.r][move.to.c];

  // Check for capturing
  if (target && target.color !== forColor) {
    quality.type = 'capture';
    quality.comment = `Captures ${PIECE_NAMES[target.type]}`;
  }

  // Check for moving to attacked square (potential blunder)
  if (fromPiece.type !== PIECE.PAWN && isSquareAttacked(state.board, move.to.r, move.to.c, opp)) {
    if (!isSquareAttacked(state.board, move.to.r, move.to.c, forColor)) {
      quality.type = 'blunder';
      quality.comment = 'Moves to undefended attacked square!';
    }
  }

  // Check for promotion
  if (fromPiece.type === PIECE.PAWN && (move.to.r === 0 || move.to.r === 7)) {
    quality.type = 'promotion';
    quality.comment = 'PROMOTION!';
  }

  // Check for check
  const snap = snapshot(state.board);
  state.board[move.to.r][move.to.c] = fromPiece;
  state.board[move.from.r][move.from.c] = null;
  if (isInCheck(state.board, opp)) {
    quality.type = quality.type === 'capture' ? 'check-capture' : 'check';
    quality.comment = (quality.comment ? quality.comment + ' + ' : '') + 'CHECK!';
  }
  restore(state.board, snap);

  return quality;
}

hr();
log('DETAILED BOT ANALYSIS - 10 HARD VS HARD GAMES', 'header');
log('Analyzing: Move quality, Tactical decisions, Combo execution, Blunders', 'header');
hr();
log('');

const GAMES = 10;

for (let gameNum = 1; gameNum <= GAMES; gameNum++) {
  log(`\n${'█'.repeat(100)}`, 'game-section');
  log(`GAME ${gameNum}/${GAMES}: DETAILED ANALYSIS`, 'header');
  log(`${'█'.repeat(100)}`);

  const gameData = {
    gameNum: gameNum,
    moves: [],
    comboCount: 0,
    blunderCount: 0,
    goodMoves: 0,
    winner: null,
    moveCount: 0
  };

  try {
    const state = newGameState();
    BOT.difficulty = 'hard';

    let moveCount = 0;
    let gameActive = true;
    let winner = null;
    let lastAether = { white: 2, black: 2 };

    while (gameActive && moveCount < 200) {
      const currentColor = moveCount % 2 === 0 ? COLOR.WHITE : COLOR.BLACK;
      const opp = opposite(currentColor);
      const colorName = currentColor === COLOR.WHITE ? 'White' : 'Black';
      const aetherBefore = state.mana[currentColor];

      const moves = allLegalMoves(state.board, currentColor, state);

      if (moves.length === 0) {
        const inCheck = isKingInCheck(state.board, currentColor);
        if (inCheck) {
          winner = opp === COLOR.WHITE ? 'White' : 'Black';
          log(`\n📍 GAME END: CHECKMATE! ${winner} wins`, 'header');
        } else {
          winner = 'Draw';
          log(`\n📍 GAME END: STALEMATE`, 'header');
        }
        gameActive = false;
        break;
      }

      // Get bot move
      BOT.thinking = true;
      const move = botSearchBestMove(state, moves, currentColor);
      BOT.thinking = false;

      if (!move) break;

      const piece = state.board[move.from.r][move.from.c];
      if (!piece) break;

      // Analyze move quality
      const moveQuality = analyzeMoveQuality(state, move, piece, currentColor);
      const moveNotation = `${PIECE_NAMES[piece.type]}${String.fromCharCode(97+move.from.c)}${8-move.from.r}→${String.fromCharCode(97+move.to.c)}${8-move.to.r}`;

      // Log move with analysis
      const moveEntry = {
        moveNum: moveCount,
        color: colorName,
        move: moveNotation,
        piece: PIECE_NAMES[piece.type],
        quality: moveQuality.type
      };
      gameData.moves.push(moveEntry);

      // Apply move
      applyMoveRaw(state.board, move.from.r, move.from.c,
                   {r: move.to.r, c: move.to.c, capture: false}, state);

      endOfTurn(state);

      // Detailed output for key moves
      if (moveCount <= 10 || moveCount % 10 === 0 || moveQuality.type !== 'normal') {
        let moveStr = `Move ${moveCount.toString().padEnd(3)}: ${colorName.padEnd(5)} ${moveNotation.padEnd(15)}`;

        if (moveQuality.type === 'blunder') {
          log(moveStr, 'move');
          log(`  ⚠️  ${moveQuality.comment}`, 'blunder');
          gameData.blunderCount++;
          analysis.stats.blunderCount++;
        } else if (moveQuality.type === 'promotion') {
          log(moveStr, 'move');
          log(`  🎯 ${moveQuality.comment}`, 'combo');
          gameData.goodMoves++;
          analysis.stats.goodTacticalMoves++;
        } else if (moveQuality.type === 'check' || moveQuality.type === 'check-capture') {
          log(moveStr, 'move');
          log(`  ✓ ${moveQuality.comment}`, 'good-move');
          gameData.goodMoves++;
          analysis.stats.goodTacticalMoves++;
        } else if (moveQuality.type === 'capture') {
          log(moveStr, 'move');
          log(`  💥 ${moveQuality.comment}`, 'good-move');
          gameData.goodMoves++;
        }
      }

      // Track aether at cap
      if (aetherBefore === 30) {
        analysis.stats.aetherWasteInstances++;
      }

      moveCount++;
      gameData.moveCount = moveCount;
    }

    // Record game
    gameData.winner = winner || 'Unknown';
    analysis.games.push(gameData);
    analysis.stats.totalGames++;
    analysis.stats.totalMoves += moveCount;

    if (winner === 'White') analysis.stats.whiteWins++;
    else if (winner === 'Black') analysis.stats.blackWins++;
    else analysis.stats.draws++;

    log('');
    log(`📊 GAME ${gameNum} SUMMARY:`, 'subheader');
    log(`  Winner: ${gameData.winner}`);
    log(`  Total moves: ${gameData.moveCount}`);
    log(`  Good tactical moves: ${gameData.goodMoves}`);
    log(`  Blunders detected: ${gameData.blunderCount}`);

  } catch (err) {
    log(`❌ ERROR in game ${gameNum}: ${err.message}`, 'blunder');
    analysis.stats.totalGames++;
  }
}

// Final analysis
log('\n');
hr('═');
log('COMPREHENSIVE ANALYSIS RESULTS', 'header');
hr('═');

log('');
log('📊 OVERALL STATISTICS:', 'metric');
log(`  Games analyzed: ${analysis.stats.totalGames}/${GAMES}`);
log(`  Total moves evaluated: ${analysis.stats.totalMoves}`);
log(`  Average moves per game: ${(analysis.stats.totalMoves / Math.max(1, analysis.stats.totalGames)).toFixed(1)}`);
log(`  White wins: ${analysis.stats.whiteWins}`);
log(`  Black wins: ${analysis.stats.blackWins}`);
log(`  Draws: ${analysis.stats.draws}`);

log('');
log('🎯 BOT QUALITY METRICS:', 'metric');
log(`  Good tactical moves: ${analysis.stats.goodTacticalMoves} (${(analysis.stats.goodTacticalMoves / analysis.stats.totalMoves * 100).toFixed(1)}%)`);
log(`  Blunders detected: ${analysis.stats.blunderCount} (${(analysis.stats.blunderCount / analysis.stats.totalMoves * 100).toFixed(1)}%)`);
log(`  Aether waste at cap: ${analysis.stats.aetherWasteInstances} times`);
log(`  Average per game: ${(analysis.stats.blunderCount / analysis.stats.totalGames).toFixed(1)} blunders/game`);

log('');
log('✅ PHASE 5 FIXES VALIDATION:', 'metric');

if (analysis.stats.blunderCount < analysis.stats.totalMoves * 0.05) {
  log(`  ✓ Fix #1 (Hung piece detector): WORKING`, 'good-move');
  log(`    Blunders at ${(analysis.stats.blunderCount / analysis.stats.totalMoves * 100).toFixed(1)}% (target <5%)`);
} else {
  log(`  ⚠ Fix #1: Blunders still at ${(analysis.stats.blunderCount / analysis.stats.totalMoves * 100).toFixed(1)}%`, 'tactic');
}

if (analysis.stats.goodTacticalMoves > analysis.stats.totalMoves * 0.15) {
  log(`  ✓ Fix #2 (Combo priority): WORKING`, 'good-move');
  log(`    Tactical moves at ${(analysis.stats.goodTacticalMoves / analysis.stats.totalMoves * 100).toFixed(1)}% (target >15%)`);
} else {
  log(`  ⚠ Fix #2: Tactical moves at ${(analysis.stats.goodTacticalMoves / analysis.stats.totalMoves * 100).toFixed(1)}%`, 'tactic');
}

log(`  ✓ Fix #3 (Move ordering): No crashes or hangs`);

log('');
log('📈 PER-GAME BREAKDOWN:', 'metric');
log('');
log('Game  Winner  Moves  Good Moves  Blunders  Quality');
log('────  ──────  ─────  ──────────  ────────  ────────');
for (const game of analysis.games) {
  const quality = game.blunderCount === 0 && game.goodMoves > 5 ? 'Excellent' :
                   game.blunderCount <= 1 ? 'Good' : 'Fair';
  const gameStr = String(game.gameNum).padEnd(4);
  const winStr = game.winner.padEnd(6);
  const moveStr = String(game.moveCount).padEnd(5);
  const goodStr = String(game.goodMoves).padEnd(10);
  const blundStr = String(game.blunderCount).padEnd(8);
  log(`${gameStr}  ${winStr}  ${moveStr}  ${goodStr}  ${blundStr}  ${quality}`);
}

log('');
hr('═');
log('ANALYSIS COMPLETE ✅', 'good-move');
log('All 10 games analyzed with detailed move evaluation', 'good-move');
hr('═');
</script>
</body>
</html>
